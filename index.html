<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css" />
    <title>Italian Recipe Generator</title>
</head>
<body>
    <div class="container">
    <header>
        <h1> Welcome to the Italian Recipe Generator!</h1>
    </header>
<main>
    <form id="recipe-generator-form">
        <input type="text" 
        placeholder="Enter your ingredients"
        autofocus
        required
        autocomplete="off"
        class="instructions"
        id="user-instructions"
         />
        <input type="submit" class="submit-button" />
    </form>
    <div class="recipe" id="recipe"> 
        The recipe goes here
        <br />
        The recipe goes here
    </div>

</main>
<footer>This project was coded by Cecilia De Rosa and is <a href="https://github.com/cecderosa/Ricette-Italiane">opensourced on Github</a> 
    and is hosted on Netlify</footer>
<script src="src/index.js"></script>
</div>
</body>

</html>
